<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Live Prediction Ledger</title>
<style>
.ledger-container {
  max-width: 1200px;
  margin: 0 auto;
}

.status-banner {
  background: linear-gradient(135deg, #28a745 0%, #20c997 100%);
  color: white;
  padding: 2rem;
  border-radius: 12px;
  margin-bottom: 2rem;
  text-align: center;
}

.status-indicator {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 1rem;
  font-size: 1.2rem;
  margin-top: 1rem;
}

.pulse {
  display: inline-block;
  width: 12px;
  height: 12px;
  background: #fff;
  border-radius: 50%;
  animation: pulse 2s infinite;
}

@keyframes pulse {
  0% {
    box-shadow: 0 0 0 0 rgba(255, 255, 255, 0.7);
  }
  70% {
    box-shadow: 0 0 0 10px rgba(255, 255, 255, 0);
  }
  100% {
    box-shadow: 0 0 0 0 rgba(255, 255, 255, 0);
  }
}

.verification-card, .predictions-card, .tools-card, .hash-card, .summary-card {
  background: white;
  border-radius: 12px;
  padding: 2rem;
  margin-bottom: 2rem;
  box-shadow: 0 4px 20px rgba(0,0,0,0.08);
  border: 1px solid #e0e0e0;
}

.verification-output {
  background: #1e1e1e;
  color: #0ff;
  padding: 1.5rem;
  border-radius: 8px;
  overflow-x: auto;
  font-family: 'Courier New', monospace;
  font-size: 0.9rem;
  line-height: 1.4;
}

.verification-output pre {
  margin: 0;
  color: #0ff;
}

.last-verified {
  text-align: right;
  color: #666;
  font-size: 0.9rem;
  margin-top: 1rem;
}

.prediction-list {
  display: flex;
  flex-direction: column;
  gap: 1rem;
}

.prediction-category {
  margin-bottom: 2.5rem;
}

.prediction-category h3 {
  color: #333;
  margin-bottom: 1rem;
  padding-bottom: 0.5rem;
  border-bottom: 2px solid #e0e0e0;
}

.prediction-item {
  display: flex;
  gap: 1rem;
  padding: 1rem;
  border-radius: 8px;
  background: #f8f9fa;
  border: 2px solid transparent;
  margin-bottom: 1rem;
}

.prediction-item.pending {
  border-color: #ffc107;
}

.prediction-item.verified {
  border-color: #28a745;
}

.prediction-status {
  font-size: 2rem;
}

.prediction-content h4 {
  margin: 0 0 0.5rem 0;
  color: #333;
}

.prediction-content p {
  margin: 0.25rem 0;
  color: #666;
}

.prediction-date {
  font-size: 0.85rem;
  color: #999;
}

.tool-links {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
  gap: 1rem;
  margin-top: 1rem;
}

.tool-button {
  display: flex;
  align-items: center;
  gap: 0.5rem;
  padding: 1rem;
  background: #007bff;
  color: white;
  text-decoration: none;
  border-radius: 8px;
  transition: all 0.3s;
  text-align: center;
  justify-content: center;
}

.tool-button:hover {
  background: #0056b3;
  transform: translateY(-2px);
  box-shadow: 0 4px 12px rgba(0,123,255,0.3);
}

.tool-icon {
  font-size: 1.5rem;
}

.category-nav {
  background: #f8f9fa;
  padding: 1.5rem;
  border-radius: 8px;
  margin-bottom: 2rem;
}

.category-nav h3 {
  margin-top: 0;
  margin-bottom: 1rem;
  color: #333;
}

.nav-buttons {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
  gap: 0.75rem;
}

.nav-btn {
  display: inline-block;
  padding: 0.5rem 1rem;
  background: white;
  border: 1px solid #dee2e6;
  border-radius: 6px;
  text-decoration: none;
  color: #495057;
  font-size: 0.9rem;
  transition: all 0.2s;
  text-align: center;
}

.nav-btn:hover {
  background: #007bff;
  color: white;
  border-color: #007bff;
  transform: translateY(-1px);
  box-shadow: 0 2px 8px rgba(0,123,255,0.2);
}

.hash-info {
  background: #f8f9fa;
  padding: 1.5rem;
  border-radius: 8px;
  margin: 1rem 0;
}

.hash-info code {
  display: block;
  font-family: 'Courier New', monospace;
  font-size: 0.85rem;
  color: #007bff;
  word-break: break-all;
  margin: 0.5rem 0;
}

.hash-date {
  font-size: 0.85rem;
  color: #666;
  margin-top: 0.5rem;
}

.verification-steps {
  margin-top: 1.5rem;
}

.verification-steps ol {
  margin-left: 1.5rem;
  color: #666;
}

.summary-stats {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
  gap: 1.5rem;
  margin: 1.5rem 0;
}

.stat-box {
  text-align: center;
  padding: 1.5rem;
  background: #f8f9fa;
  border-radius: 8px;
}

.stat-number {
  font-size: 2.5rem;
  font-weight: bold;
  color: #333;
}

.stat-number.pending-color {
  color: #ffc107;
}

.stat-number.verified-color {
  color: #28a745;
}

.stat-number.accuracy-color {
  color: #007bff;
}

.stat-label {
  font-size: 0.9rem;
  color: #666;
  margin-top: 0.5rem;
}

.summary-note {
  text-align: center;
  color: #666;
  font-style: italic;
  margin-top: 1rem;
}

/* Responsive */
@media (max-width: 768px) {
  .verification-card, .predictions-card, .tools-card, .hash-card, .summary-card {
    padding: 1.5rem;
  }
  
  .verification-output {
    font-size: 0.8rem;
    padding: 1rem;
  }
  
  .tool-links {
    grid-template-columns: 1fr;
  }
  
  .summary-stats {
    grid-template-columns: repeat(2, 1fr);
  }
}
</style>
